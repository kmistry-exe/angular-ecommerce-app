<section class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-sm border p-6">
    <!-- Header -->
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-semibold">Admin Login</h1>
      <p class="text-sm text-gray-500">Sign in to access the admin panel</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-lg border px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="admin@example.com"
        />
        <p
          *ngIf="f.email.touched && f.email.errors"
          class="text-xs text-red-500 mt-1"
        >
          <span *ngIf="f.email.errors['required']">Email is required</span>
          <span *ngIf="f.email.errors['email']">Enter a valid email</span>
        </p>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg border px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter your password"
        />
        <p
          *ngIf="f.password.touched && f.password.errors"
          class="text-xs text-red-500 mt-1"
        >
          <span *ngIf="f.password.errors['required']"
            >Password is required</span
          >
          <span *ngIf="f.password.errors['minlength']"
            >Minimum 6 characters required</span
          >
        </p>
      </div>

      <div *ngIf="loginError" class="text-sm text-red-500">
        {{ loginError }}
      </div>
      
      <!-- Submit -->
      <button
        type="submit"
        [disabled]="isSubmitting"
        class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 transition disabled:opacity-50"
      >
        {{ isSubmitting ? "Signing in..." : "Login" }}
      </button>
    </form>
  </div>
</section>
