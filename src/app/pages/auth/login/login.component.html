<section class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-sm border p-6">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-semibold">Admin Login</h1>
      <p class="text-sm text-gray-500">Sign in to access the admin panel</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <app-text
        label="Email"
        placeholder="admin@example.com"
        [control]="f.email"
        [requiredMessage]="formErrorMessages.REQUIRED"
        [emailMessage]="formErrorMessages.EMAIL"
      />

      <app-text
        label="Password"
        placeholder="Enter your password"
        [control]="f.password"
        [requiredMessage]="formErrorMessages.REQUIRED"
        [minlengthMessage]="formErrorMessages.MIN_LENGTH"
      />

      <div *ngIf="loginError" class="text-sm text-red-500">
        {{ loginError }}
      </div>

      <div class="text-right">
        <app-button variant="primary" type="submit" label="Sign In" />
      </div>
    </form>
  </div>
</section>
