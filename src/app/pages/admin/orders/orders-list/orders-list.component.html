<div class="space-y-6">
  <app-page-header title="Orders">
    <app-button
      variant="primary"
      label="Add Order"
      icon="fa-plus"
      (click)="openAddModal()"
    ></app-button>
  </app-page-header>

  <app-error-state *ngIf="errorMessage" [message]="errorMessage">
  </app-error-state>

  <app-empty-state
    *ngIf="!errorMessage && orders.length === 0"
    title="No Orders Found"
    description="Orders will appear here once customers place them."
  >
  </app-empty-state>

  <div *ngIf="orders.length > 0" class="gap-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <app-card *ngFor="let order of paginatedOrders">
        <div card-title>
          <span class="text-sm text-gray-600">
            Order:
            <span class="text-indigo-400">#{{ order.id }}</span>
            | Customer:
            <span class="text-indigo-400">{{ order.customerName }}</span>
          </span>
        </div>

        <div card-header-right>
          <span
            class="px-3 py-1 text-xs font-medium rounded-full"
            [ngClass]="getStatusClass(order.status)"
          >
            {{ order.status }}
          </span>
        </div>

        <hr class="my-3 border-gray-200" />

        <div card-body class="space-y-3">
          <div class="flex justify-between text-sm text-gray-700">
            <div>
              Product: <span class="font-medium">{{ order.product }}</span>
            </div>

            <div>
              Quantity: <span class="font-medium">{{ order.quantity }}</span>
            </div>
          </div>

          <div class="flex justify-between text-sm text-gray-700">
            <div>
              {{ order.status }} at
              <span class="font-medium">{{ order.date }}</span>
            </div>

            <div class="font-semibold text-gray-900">
              ₹{{ order.amount | number }}
            </div>
          </div>
        </div>

        <hr class="my-3 border-gray-200" />

        <div card-actions class="flex gap-3 justify-center md:justify-end">
          <app-button
            variant="secondary"
            label="Edit"
            icon="fa-edit"
            (click)="openEditModal(order)"
          ></app-button>

          <app-button
            variant="danger"
            label="Delete"
            icon="fa-trash"
            (click)="openDeleteModal(order)"
          ></app-button>
        </div>
      </app-card>
    </div>

    <app-pagination
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (pageChange)="goToPage($event)"
    ></app-pagination>

    <app-confirmation-modal
      *ngIf="showDeleteModal"
      title="Delete Order"
      [message]="
        'Are you sure you want to delete Order #' +
        selectedOrder?.id +
        '? This action cannot be undone.'
      "
      confirmText="Delete"
      confirmVariant="danger"
      confirmIcon="fa-trash"
      (confirm)="confirmDelete()"
      (cancel)="closeDeleteModal()"
    >
    </app-confirmation-modal>

    <app-add-order
      *ngIf="showAddModal"
      (save)="handleOrderSaved()"
      (close)="closeAddModal()"
    ></app-add-order>

    <app-edit-order
      *ngIf="showEditModal"
      [order]="selectedOrder"
      (save)="handleOrderSaved()"
      (close)="closeEditModal()"
    ></app-edit-order>

    <app-view-order
      *ngIf="showViewModal"
      [order]="selectedOrder"
      (closeView)="closeViewModal()"
    ></app-view-order>
  </div>
</div>
