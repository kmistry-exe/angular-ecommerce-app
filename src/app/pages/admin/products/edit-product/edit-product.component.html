<div class="max-w-3xl mx-auto bg-white rounded-xl border p-6">
    <h1 class="text-2xl font-semibold mb-6">Edit Product</h1>

    <form class="space-y-6">

        <!-- Product Name -->
        <div>
            <label class="block text-sm font-medium mb-1">Product Name</label>
            <input type="text" [value]="mockProduct.name"
                class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
                placeholder="Enter product name" />
        </div>

        <!-- Category -->
        <div>
            <label class="block text-sm font-medium mb-1">Category</label>
            <select class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200">
                <option>Electronics</option>
                <option>Fashion</option>
                <option>Home</option>
                <option>Books</option>
            </select>
        </div>

        <!-- Price -->
        <div>
            <label class="block text-sm font-medium mb-1">Price</label>
            <input type="number"
                class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
                placeholder="Enter price" />
        </div>

        <!-- Stock -->
        <div>
            <label class="block text-sm font-medium mb-1">Stock Quantity</label>
            <input type="number"
                class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
                placeholder="Enter stock quantity" />
        </div>

        <!-- Description -->
        <div>
            <label class="block text-sm font-medium mb-1">Description</label>
            <textarea rows="4"
                class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
                placeholder="Enter product description"></textarea>
        </div>

        <!-- Buttons -->
        <div class="flex justify-end gap-3">
            <button type="button" class="px-4 py-2 border rounded-lg hover:bg-gray-50">
                Cancel
            </button>

            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                Update Product
            </button>
        </div>

    </form>
</div>
