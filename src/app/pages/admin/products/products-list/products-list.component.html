<div class="space-y-6">
  <app-page-header title="Products">
    <app-button
      variant="primary"
      label="Add Product"
      icon="fa-plus"
      (click)="openAddModal()"
    />
  </app-page-header>

  <app-error-state
    *ngIf="errorMessage"
    [message]="errorMessage"
  ></app-error-state>

  <app-empty-state
    *ngIf="!errorMessage && products.length === 0"
    title="No Products Found"
    description="Start by adding your first product."
  ></app-empty-state>

  <div
    *ngIf="products.length > 0"
    class="bg-white border rounded-xl p-4 overflow-x-auto"
  >
    <table class="min-w-full text-sm text-left">
      <thead class="text-xs uppercase text-gray-500 border-b">
        <tr>
          <th class="py-3">Name</th>
          <th class="py-3">Category</th>
          <th class="py-3 text-right">Price</th>
          <th class="py-3 text-center">Stock</th>
          <th class="py-3 text-center">Status</th>
          <th class="py-3 text-right">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y">
        <tr *ngFor="let product of products" class="hover:bg-gray-50">
          <td class="py-3 font-medium">
            {{ product.name }}
          </td>

          <td class="py-3">
            {{ product.category }}
          </td>

          <td class="py-3 text-right">₹ {{ product.price | number }}</td>

          <td class="py-3 text-center">
            {{ product.stock }}
          </td>

          <td class="py-3 text-center">
            <span
              class="px-2 py-1 rounded-full text-xs font-medium"
              [ngClass]="getStatusClass(product.status)"
            >
              {{ product.status }}
            </span>
          </td>

          <td class="py-3 text-right space-x-2">
            <app-button
              variant="secondary"
              icon="fa-pen"
              [iconOnly]="true"
              (click)="openEditModal(product)"
            />
            <app-button
              variant="danger"
              icon="fa-trash"
              [iconOnly]="true"
              (click)="openDeleteModal(product)"
            />
          </td>
        </tr>
      </tbody>
    </table>

    <app-confirmation-modal
      *ngIf="showDeleteModal"
      title="Delete Product"
      [message]="
        'Are you sure you want to delete ' +
        selectedProduct?.name +
        '? This action cannot be undone.'
      "
      confirmText="Delete"
      confirmVariant="danger"
      confirmIcon="fa-trash"
      (confirm)="confirmDelete()"
      (cancel)="closeDeleteModal()"
    >
    </app-confirmation-modal>

    <div
      *ngIf="showAddModal"
      class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
    >
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6">
        <app-add-products (close)="closeAddModal()" />
      </div>
    </div>

    <div
      *ngIf="showEditModal"
      class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
    >
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6">
        <app-edit-product
          [product]="selectedProduct"
          (save)="updateProductTable($event)"
          (close)="closeEditModal()"
        />
      </div>
    </div>
  </div>
</div>
