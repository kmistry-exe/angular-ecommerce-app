<div class="space-y-6">

    <!-- Page Header -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold">Products</h1>

        <a routerLink="/admin/products/add"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
            + Add Product
        </a>
    </div>

    <!-- Products Table Card -->
    <div class="bg-white border rounded-xl p-4 overflow-x-auto">

        <table class="min-w-full text-sm text-left">

            <thead class="text-xs uppercase text-gray-500 border-b">
                <tr>
                    <th class="py-3">Name</th>
                    <th class="py-3">Category</th>
                    <th class="py-3 text-right">Price</th>
                    <th class="py-3 text-center">Stock</th>
                    <th class="py-3 text-center">Status</th>
                    <th class="py-3 text-right">Actions</th>
                </tr>
            </thead>

            <tbody class="divide-y">
                <tr *ngFor="let product of products" class="hover:bg-gray-50">

                    <td class="py-3 font-medium">
                        {{ product.name }}
                    </td>

                    <td class="py-3">
                        {{ product.category }}
                    </td>

                    <td class="py-3 text-right">
                        ₹ {{ product.price | number }}
                    </td>

                    <td class="py-3 text-center">
                        {{ product.stock }}
                    </td>

                    <td class="py-3 text-center">
                        <span class="px-2 py-1 rounded-full text-xs font-medium"
                            [ngClass]="getStatusClass(product.status)">
                            {{ product.status }}
                        </span>
                    </td>

                    <td class="py-3 text-right space-x-2">
                        <button class="text-blue-600 hover:underline text-sm">
                            Edit
                        </button>
                        <button class="text-red-600 hover:underline text-sm">
                            Delete
                        </button>
                    </td>

                </tr>
            </tbody>

        </table>

    </div>
</div>
