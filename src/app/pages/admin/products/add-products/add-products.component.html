<div class="max-w-3xl mx-auto bg-white rounded-xl border p-6">
  <h1 class="text-2xl font-semibold mb-6">Add Product</h1>

  <form class="space-y-6" [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <!-- Product Name -->
    <div>
      <label class="block text-sm font-medium mb-1">Product Name</label>
      <input
        type="text"
        formControlName="name"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
        placeholder="Enter product name"
      />

      <div
        *ngIf="f['name'].touched && f['name']?.invalid"
        class="text-red-500 text-sm mt-1"
      >
        This field is required
      </div>
    </div>

    <!-- Category -->
    <div>
      <label class="block text-sm font-medium mb-1">Category</label>
      <select
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
        formControlName="category"
      >
        <option>Electronics</option>
        <option>Fashion</option>
        <option>Home</option>
        <option>Books</option>
      </select>

      <div
        *ngIf="f['category'].touched && f['category'].invalid"
        class="text-red-500 text-sm mt-1"
      >
        This field is required
      </div>
    </div>

    <!-- Price -->
    <div>
      <label class="block text-sm font-medium mb-1">Price</label>
      <input
        type="number"
        formControlName="price"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
        placeholder="Enter price"
      />

      <div
        *ngIf="f['price'].touched && f['price'].invalid"
        class="text-red-500 text-sm mt-1"
      >
        <span *ngIf="f['price'].errors?.['required']">
          This field is required
        </span>
        <span *ngIf="f['price'].errors?.['min']">
          Price must be greater than 0
        </span>
      </div>
    </div>

    <!-- Stock -->
    <div>
      <label class="block text-sm font-medium mb-1">Stock Quantity</label>
      <input
        type="number"
        formControlName="stock"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
        placeholder="Enter stock quantity"
      />

      <div
        *ngIf="f['stock'].touched && f['stock'].invalid"
        class="text-red-500 text-sm mt-1"
      >
        <span *ngIf="f['stock'].errors?.['required']">
          This field is required
        </span>
        <span *ngIf="f['stock'].errors?.['min']">
          Stock cannot be negative
        </span>
      </div>
    </div>

    <!-- Description -->
    <div>
      <label class="block text-sm font-medium mb-1">Description</label>
      <textarea
        rows="4"
        formControlName="description"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-200"
        placeholder="Enter product description"
      ></textarea>

      <div
        *ngIf="f['description'].touched && f['description'].invalid"
        class="text-red-500 text-sm mt-1"
      >
        This field is required
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end gap-3">
      <button
        type="button"
        class="px-4 py-2 border rounded-lg hover:bg-gray-50"
        (click)="onCancel()"
      >
        Cancel
      </button>

      <button
        type="submit"
        [disabled]="productForm.invalid"
        class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Save Product
      </button>
    </div>
  </form>
</div>
