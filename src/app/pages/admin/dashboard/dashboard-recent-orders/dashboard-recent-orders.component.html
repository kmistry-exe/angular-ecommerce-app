<div class="overflow-x-auto">
  <table class="min-w-full text-sm text-left">

    <thead class="text-xs uppercase text-gray-500 border-b">
      <tr>
        <th class="py-3">Order ID</th>
        <th class="py-3">Customer</th>
        <th class="py-3">Date</th>
        <th class="py-3 text-right">Amount</th>
        <th class="py-3 text-center">Status</th>
      </tr>
    </thead>

    <tbody class="divide-y">
      <tr *ngFor="let order of orders" class="hover:bg-gray-50">
        <td class="py-3 font-medium">{{ order.id | date:'dd MMM yyyy' }}</td>
        <td class="py-3">{{ order.customer }}</td>
        <td class="py-3">{{ order.date }}</td>
        <td class="py-3 text-right">₹ {{ order.amount | number }}</td>
        <td class="py-3 text-center">
          <span class="px-2 py-1 rounded-full text-xs font-medium" [ngClass]="getStatusClasses(order.status)">
            {{ order.status }}
          </span>
        </td>
      </tr>
    </tbody>

  </table>
</div>
