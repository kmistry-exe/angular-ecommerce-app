<section class="p-6 space-y-6">
  <!-- Page Header -->
  <div>
    <h1 class="text-2xl font-semibold">Dashboard</h1>
    <p class="text-sm text-gray-500">Overview of store performance</p>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <app-stat-card
      *ngFor="let stat of stats"
      [label]="stat.label"
      [value]="stat.value"
      [prefix]="stat.prefix"
    />
  </div>

  <!-- Main Content (empty for now) -->
  <div
    class="h-64 rounded-lg border border-dashed flex items-center justify-center text-gray-400"
  >
    Charts & tables coming next
  </div>
</section>
