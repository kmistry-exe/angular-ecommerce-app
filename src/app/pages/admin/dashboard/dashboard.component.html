<section class="space-y-6">
  <app-page-header title="Dashboard" subtitle="Overview of store performance" />

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <ng-container *ngIf="!errorMessage">
      <app-stat-card
        *ngFor="let stat of stats"
        [label]="stat.label"
        [value]="stat.value"
        [prefix]="stat.prefix"
      />
    </ng-container>

    <div class="col-span-1 sm:col-span-2 lg:col-span-4" *ngIf="errorMessage">
      <app-error-state [message]="errorMessage"></app-error-state>
    </div>
  </div>

  <section class="mt-6" *ngIf="!errorMessage">
    <app-recent-activity
      title="Recent Orders"
      [items]="recentOrders"
      [columns]="recentOrdersColumns"
      [pageSize]="5"
      (onViewAll)="viewAllOrders()"
      (onViewItem)="viewOrder($event)"
    ></app-recent-activity>
  </section>

  <app-view-order
    *ngIf="showViewModal"
    [order]="selectedOrder"
    (closeView)="closeViewModal()"
  ></app-view-order>
</section>
