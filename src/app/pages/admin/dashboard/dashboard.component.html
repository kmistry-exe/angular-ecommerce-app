<section class="space-y-6">
  <app-page-header title="Dashboard" subtitle="Overview of store performance" />

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <ng-container *ngIf="!isLoading; else loadingStats">
      <app-stat-card
        *ngFor="let stat of stats"
        [label]="stat.label"
        [value]="stat.value"
        [prefix]="stat.prefix"
      />
    </ng-container>

    <ng-template #loadingStats>
      <div class="col-span-full text-center text-gray-500 py-6">
        Loading analytics...
      </div>
    </ng-template>
  </div>

  <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="lg:col-span-1 rounded-xl border bg-white p-4">
      <h2 class="text-lg font-medium mb-4">Sales Overview</h2>

      <div class="h-80">
        <app-dashboard-chart></app-dashboard-chart>
      </div>
    </div>

    <div class="rounded-xl border bg-white p-4">
      <h2 class="text-lg font-medium mb-4">Recent Orders</h2>

      <div class="h-80">
        <app-dashboard-recent-orders></app-dashboard-recent-orders>
      </div>
    </div>
  </section>
</section>
