<div
  class="fixed inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-50"
>
  <div class="w-full max-w-md bg-white rounded-xl shadow-xl border p-6">
    <app-page-header [title]="title" />

    <p class="text-gray-600 mb-6">
      {{ message }}
    </p>

    <div class="flex justify-end gap-3">
      <app-button
        [icon]="cancelIcon"
        variant="secondary"
        [label]="cancelText"
        (click)="onCancel()"
      />

      <app-button
        [icon]="confirmIcon"
        [variant]="confirmVariant"
        [label]="confirmText"
        (click)="onConfirm()"
      />
    </div>
  </div>
</div>
