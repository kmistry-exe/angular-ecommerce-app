<div
  class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm transition-all duration-200 hover:shadow-md hover:-translate-y-1 hover:border-indigo-600 p-5 active:scale-[0.98] flex flex-col h-full"
>
  <div
    class="flex items-center justify-between pb-3 mb-3 border-b border-gray-200 dark:border-gray-700"
  >
    <div class="font-semibold text-lg text-gray-800 dark:text-white">
      <ng-content select="[card-title]"></ng-content>
    </div>

    <div>
      <ng-content select="[card-header-right]"></ng-content>
    </div>
  </div>

  <div class="space-y-3 text-sm text-gray-700 dark:text-gray-300 grow">
    <ng-content select="[card-body]"></ng-content>
  </div>

  <div
    class="flex justify-end gap-4 pt-4 mt-4 border-t border-gray-200 dark:border-gray-700"
  >
    <ng-content select="[card-actions]"></ng-content>
  </div>
</div>
