<div class="w-full mb-2">
  <label
    *ngIf="label"
    class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300"
  >
    {{ label }}
  </label>

  <input
    [type]="type"
    [formControl]="control"
    [placeholder]="placeholder"
    class="w-full h-12 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-colors"
  />

  <div class="min-h-[18px] mt-1">
    <app-input-error
      [control]="control"
      [requiredMessage]="requiredMessage"
      [emailMessage]="emailMessage"
      [minlengthMessage]="minlengthMessage"
    />
  </div>
</div>
