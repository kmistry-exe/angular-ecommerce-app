<div class="w-full">
  <hr class="mt-6 border-gray-200" />

  <div class="flex justify-center items-center gap-2 mt-4">
    <button
      class="px-3 py-2 rounded-lg text-sm transition hover:bg-indigo-600 hover:text-white disabled:opacity-40"
      (click)="prev()"
      [disabled]="currentPage === 1"
    >
      <i class="fa-solid fa-chevron-left"></i>
    </button>

    <button
      *ngFor="let page of pages()"
      (click)="changePage(page)"
      class="px-3 py-2 border rounded-lg text-sm transition"
      [ngClass]="
      page === currentPage
        ? 'bg-indigo-600 text-white border-indigo-600'
        : 'bg-white text-gray-700 hover:bg-indigo-600 hover:text-white'
    "
    >
      {{ page }}
    </button>

    <button
      class="px-3 py-2 rounded-lg text-sm transition hover:bg-indigo-600 hover:text-white disabled:opacity-40"
      (click)="next()"
      [disabled]="currentPage === totalPages"
    >
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>
