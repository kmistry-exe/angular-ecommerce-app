<div
  class="flex flex-col min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300"
>
  <header
    *ngIf="isMobile"
    class="fixed top-0 left-0 right-0 h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 z-50 shrink-0"
  >
    <div class="flex items-center gap-3">
      <i
        class="fa-solid fa-cart-shopping text-indigo-600 dark:text-indigo-400 text-xl"
      ></i>
      <span
        class="text-lg font-bold text-gray-900 dark:text-white uppercase tracking-tight"
      >
        ECommerce App
      </span>
    </div>
    <app-button
      label="Menu"
      variant="primary"
      icon="fa-bars"
      (click)="toggleMobileMenu()"
    />
  </header>

  <div class="flex flex-1" [class.pt-16]="isMobile">
    <aside
      class="bg-gray-900 text-white flex flex-col z-40 transition-all duration-300 border-r border-gray-700 px-4"
      [class.fixed]="true"
      [class.left-0]="true"
      [class.top-0]="true"
      [class.h-screen]="true"
      [class.w-64]="!isMobile"
      [class.hidden]="isMobile && !isMobileMenuOpen"
      [class.mobile-card-nav]="isMobile && isMobileMenuOpen"
    >
      <div class="flex flex-col items-center p-4">
        <div
          class="w-full flex items-center {{
            isMobile ? 'justify-between' : 'justify-center'
          }}"
        >
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-cart-shopping text-indigo-400 text-xl"></i>
            <span class="text-lg font-bold tracking-tight">ECommerce App</span>
          </div>
          <div *ngIf="isMobile">
            <button (click)="closeMobileMenu()" class="p-2 text-gray-400">
              <i class="fa-solid fa-xmark text-xl"></i>
            </button>
          </div>
        </div>
      </div>

      <hr class="w-full border-gray-700" />

      <div class="my-3 text-center">
        <span class="text-xs text-gray-100">
          {{ isDemoMode ? "Demo Mode" : "Logged in as" }}
        </span>
        <br />
        <span class="text-md text-indigo-600">
          {{ userEmail }}
        </span>
      </div>

      <hr class="w-full border-gray-700" />

      <nav class="flex-1 overflow-y-auto py-4 space-y-1">
        <a
          routerLink="/admin/dashboard"
          routerLinkActive="bg-indigo-600 text-white font-semibold"
          (click)="closeMobileMenu()"
          class="flex items-center gap-3 p-3 rounded-lg text-sm font-medium text-gray-400 hover:bg-indigo-600 hover:text-white transition-all"
        >
          <i class="fa-solid fa-hashtag"></i>
          <span>Dashboard</span>
        </a>
        <a
          routerLink="/admin/products"
          routerLinkActive="bg-indigo-600 text-white font-semibold"
          (click)="closeMobileMenu()"
          class="flex items-center gap-3 p-3 rounded-lg text-sm font-medium text-gray-400 hover:bg-indigo-600 hover:text-white transition-all"
        >
          <i class="fa-solid fa-box"></i>
          <span>Products</span>
        </a>
        <a
          routerLink="/admin/orders"
          routerLinkActive="bg-indigo-600 text-white font-semibold"
          (click)="closeMobileMenu()"
          class="flex items-center gap-3 p-3 rounded-lg text-sm font-medium text-gray-400 hover:bg-indigo-600 hover:text-white transition-all"
        >
          <i class="fa-solid fa-boxes-packing"></i>
          <span>Orders</span>
        </a>
      </nav>

      <hr class="border-gray-700" />

      <div class="space-y-3">
        <button
          (click)="toggleDarkMode()"
          class="mt-3 w-full flex items-center justify-between p-3 rounded-lg text-sm font-medium text-gray-400 hover:bg-indigo-600 hover:text-white transition-all"
        >
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-moon"></i>
            <span>Dark Mode</span>
          </div>
          <div
            class="w-10 h-5 rounded-full relative transition-colors duration-200"
            [ngClass]="isDarkMode ? 'bg-indigo-600' : 'bg-gray-700'"
          >
            <div
              class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-transform duration-200"
              [class.translate-x-5]="isDarkMode"
              [class.translate-x-0]="!isDarkMode"
            ></div>
          </div>
        </button>

        <hr class="border-gray-700" />

        <div class="text-center py-4">
          <app-button
            [label]="isDemoMode ? 'Login' : 'Logout'"
            [variant]="isDemoMode ? 'primary' : 'danger'"
            [icon]="
              isDemoMode
                ? 'fa-solid fa-right-to-bracket'
                : 'fa-solid fa-right-from-bracket'
            "
            class="w-full block"
            (click)="isDemoMode ? openLoginConfirm() : openLogoutConfirm()"
          />
        </div>
      </div>
    </aside>

    <main
      class="flex-1 transition-all duration-300 p-6 pb-20 overflow-y-auto"
      [class.ml-64]="!isMobile"
    >
      <div class="max-w-7xl mx-auto">
        <div
          *ngIf="isDemoMode && isDashboardOrList"
          class="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800 rounded-lg p-4 mb-6 shadow-sm"
        >
          <div class="flex items-center gap-3">
            <i
              class="fa-solid fa-circle-info text-indigo-600 dark:text-indigo-400"
            ></i>
            <p class="text-sm text-indigo-800 dark:text-indigo-300">
              <span class="font-semibold text-indigo-600 dark:text-indigo-400"
                >Demo Mode Active:</span
              >
              Explore all modules freely. Administrative actions (Create,
              Update, Delete) are disabled.
            </p>
          </div>
        </div>
        <router-outlet></router-outlet>
      </div>
    </main>

    <footer
      class="fixed bottom-0 right-0 h-10 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 z-30 transition-all duration-300"
      [class.left-64]="!isMobile"
      [class.left-0]="isMobile"
    >
      <div class="flex items-center gap-2">
        <i
          class="fa-solid fa-cart-shopping text-indigo-600 dark:text-indigo-400 text-xs"
        ></i>
        <p class="text-xs text-gray-500 dark:text-gray-400 font-medium">
          ECommerce App
        </p>
      </div>
      <a
        href="https://github.com/kmistry-exe"
        target="_blank"
        class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition"
      >
        <i class="fa-brands fa-github text-sm"></i>
        <span>kmistry-exe</span>
      </a>
    </footer>
  </div>

  <app-confirmation-modal
    *ngIf="showLogoutConfirm"
    title="Confirm Logout"
    message="Are you sure you want to logout?"
    (confirm)="confirmLogout()"
    (cancel)="cancelLogout()"
  />

  <app-confirmation-modal
    *ngIf="showLoginConfirm"
    title="Admin Login"
    message="Are you sure you want to go to the login page?"
    confirmText="Login"
    confirmIcon="fa-right-to-bracket"
    (confirm)="confirmLogin()"
    (cancel)="cancelLogin()"
  />
</div>
